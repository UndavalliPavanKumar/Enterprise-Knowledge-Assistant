apiVersion: v1
kind: ConfigMap
metadata:
  name: eka-config
  namespace: eka
data:
  DATABASE_URL: "postgresql://eka_user:eka_password@postgres:5432/eka_db"
  OPENAI_MODEL: "gpt-4"
  EMBEDDING_MODEL: "text-embedding-3-small"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
---
apiVersion: v1
kind: Secret
metadata:
  name: eka-secrets
  namespace: eka
type: Opaque
stringData:
  OPENAI_API_KEY: "sk-your-api-key-here"
  DB_PASSWORD: "eka_password"
